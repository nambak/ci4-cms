name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "app/**/*.php"
      - "src/**/*.css"
      - "**/*.json"
      - "**/*.js"
      - "tests/**/*.php"
      - "public/docs/**"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Read,Glob,Grep"
          prompt: |
            이 PR의 변경 사항을 리뷰해주세요. 다음 항목을 중점적으로 확인합니다:
            - CodeIgniter 4 컨벤션 및 PHP 8.x 모범 사례
            - 보안 취약점 (OWASP Top 10: SQL Injection, XSS, CSRF 등)
            - 코드 품질 및 유지보수성
            - 테스트 커버리지 고려사항
            리뷰는 한국어로 작성해주세요.
            반드시 mcp__github_inline_comment__create_inline_comment 도구(confirmed: true)를 사용하여 변경된 코드에 인라인 리뷰 코멘트를 남겨주세요.

